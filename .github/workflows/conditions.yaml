name: conditions demo

# Triggers manually using the "Run workflow" button in the GitHub UI
on: [push]

jobs:
  # Job name
  say-hello:
    runs-on: ubuntu-latest # github hosted runners
    steps:
      - name: main branch
        if: github.ref_name =='main'
        run: echo "This one executes if branch is main"
   
      - name: fearure branch
        if: github.ref_name =='feature-*'
        run: echo "This one executes if branch is feature"