name: Environment context demo

# Triggers manually using the "Run workflow" button in the GitHub UI
on: workflow_dispatch

env: 
   project: "roboshop"
   component: "catalogue"
   environment: "dev"
jobs:
  # Job name
   github-context:
    runs-on: ubuntu-latest # github hosted runners
    outputs:
      image-name: ${{ steps.tag.outputs.image-name }}
      image-version: ${{ steps.tag.outputs.version }}
    steps:
      - name: Print info
        run: | 
          echo "${{ toJson(github) }}"
          echo "branch name: ${{ github.ref_name }}"
       
      - name: access env variables
        run: |
           echo "project: $project"
           echo "component: $component"
           echo "environment: $environment"

      - name: Print secrets for texting
        run: |
           echo "DB User name: ${{ secrets.DB_USER}}"
           echo "DB User name: ${{ secrets.DB_PASSWORD}}"

      - name: Print variables
        run: |
           echo "DB URL: ${{ vars.DB_URL}}"     

      - name: image tag
        id: tag # id is mandatory to access the output of this step in later steps
        run: |
          echo "version=1.0.0" >> $GITHUB_OUTPUT
          echo "image-name=catalogue" >> $GITHUB_OUTPUT

      - name: print previous step output
        run: |
          echo "Image name: ${{ steps.tag.outputs.image-name }}"
          echo "Version: ${{ steps.tag.outputs.version }}"   

      
      # useful with in the job
      - name: github env
        run: |
          echo "Course=github-actions" >> $GITHUB_ENV
          echo "Duration=5hours" >> $GITHUB_ENV

      - name: print github env
        run: |
          echo "Course: $Course"
          echo "Duration: $Duration"

   deploy:
    needs: github-context # means depends on above job
    runs-on: ubuntu-latest # Github hosted runners
    steps:
      - name: print github env in another job
        run: |
          echo "Image Name: ${{ needs.github-context.outputs.image-name }}"
          echo "Image Version: ${{ needs.github-context.outputs.image-version }}"   
   scan:
     runs-on: ubuntu-latest
     steps:
      - name: sonar scan 
        run: echo "sonar-scan runs and use quality gates"

      - name: Status of Job
        run: 
          echo "${{ toJson(job) }}"  

      - name: Status of Job
        run: 
          echo "${{ toJson(runner) }}"      